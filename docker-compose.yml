version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: API/Dockerfile
    container_name: api
    depends_on:
      - db
    ports:
      - "5209:8080"
    volumes:
      - data-protection-keys:/root/.aspnet/DataProtection-Keys
    networks:
      - db-network

  db:
    container_name: db
    image: postgres:16
    environment:
      POSTGRES_DB: "kontinuum_lms"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "root"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
    networks:
      - db-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - db-network

networks:
  db-network:
    driver: bridge

volumes:
  db-data:
  data-protection-keys:
